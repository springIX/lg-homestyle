        <p>
          페르세발은 1996년, 프랑스 커트러리의 본고장 티에르에서 시작된 나이프 브랜드예요. <br class="display-tablet" />
          장인 엠마뉴엘 사바시에(Emmanuel Chavassieus)와 에릭 페르세발(Eric Perceval)의 협업으로 탄생했어요. <br class="display-tablet" />
          현재는 프랑스는 물론 전 세계 미슐랭 셰프와 미식가들에게 사랑받는 고급 테이블 나이프로 잘 알려져 있어요.<br class="display-tablet" />
          페르세발을 홈스타일에서 만나보세요.
