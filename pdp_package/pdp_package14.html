<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestyle PDP Package</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/pdp_package.css">
</head>
<body>
  <div class="pdp">
    <div class="pdp__kv" style="--pdp-kv-bg: #000; --pdp-kv-title-width: 575px;">
      <div class="pdp__kv-header">
        <img class="pdp__kv-title" src="images/pdp_kv_title15.svg" alt="프리미엄 웨딩 패키지">
        <p class="pdp__kv-subtitle">우리가 꿈꾸던 <b>완벽한 라이프스타일의 첫 시작</b></p>
      </div>
      <div class="pdp__kv-image">
        <img src="images/pdp_kv_14_crop.jpg" alt="프리미엄 웨딩 패키지">
      </div>
    </div>

    <div class="pdp__info" style="--pdp-info-bg: #f8d4e1;">
      <div class="pdp__info-headline">
        <p class="pdp__info-headline-sub">프리미엄 가전∙가구로 연출한</p>
        <p class="pdp__info-headline-main">신혼의 시그니처 홈</p>
      </div>
      <div class="pdp__info-row">
        <div class="pdp__info-row-header">
          <span class="pdp__info-row-num">1</span>
          <p class="pdp__info-row-title">이런 분께 추천해요</p>
        </div>
        <p class="pdp__info-row-desc">기능과 디자인은 물론 집 전체의 완성도까지 고려하는 분</p>
      </div>
      <div class="pdp__info-row">
        <div class="pdp__info-row-header">
          <span class="pdp__info-row-num">2</span>
          <p class="pdp__info-row-title">홈스타일 추천 코멘트</p>
        </div>
        <p class="pdp__info-row-desc">프리미엄 가전과 고급 가구로 신혼 공간의 완성도를 높인 패키지</p>
      </div>
    </div>
  </div>
</body>
</html>
