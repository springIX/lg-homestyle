<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestyle PDP Package</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    body {
      margin: 0 !important;
      padding: 0 !important;
    }
    .pdp,
    .pdp * {
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box !important;
    }

    .pdp {
      width: 780px !important;
      margin: 0 auto !important;
      container-type: inline-size !important;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif !important;
    }

    /* 모바일(터치) 기기에서만 비율대로 축소. PC는 780px 고정 → 좁히면 가로 스크롤 */
    @media (hover: none) and (pointer: coarse) {
      .pdp {
        width: 100% !important;
      }
    }

    .pdp .pdp__kv {
      background: var(--pdp-kv-bg, #000) !important;
      padding: 9.23cqw 0 5.13cqw !important;
      color: #fff !important;
    }
    .pdp .pdp__kv-header {
      display: flex !important;
      flex-direction: column !important;
      gap: 2.31cqw !important;
      padding: 0 5.13cqw !important;
      margin-bottom: 5.13cqw !important;
    }
    .pdp .pdp__kv-title {
      display: block !important;
      width: var(--pdp-kv-title-width, 66.67cqw) !important;
      height: 10.51cqw !important;
    }
    .pdp .pdp__kv-subtitle {
      font-size: 3.59cqw !important;
      font-weight: 500 !important;
      line-height: 1.5 !important;
      letter-spacing: -0.5px !important;
    }
    .pdp .pdp__kv-subtitle b {
      font-weight: 700 !important;
    }
    .pdp .pdp__kv-image {
      position: relative !important;
      margin: 0 5.13cqw !important;
      width: 89.74cqw !important;
      aspect-ratio: 700 / 520 !important;
      overflow: hidden !important;
      line-height: 0 !important;
    }
    .pdp .pdp__kv-image img {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    .pdp .pdp__info {
      background: var(--pdp-info-bg, #daebcc) !important;
      padding: 7.69cqw 5.13cqw !important;
      color: #000 !important;
    }
    .pdp .pdp__info-headline {
      display: flex !important;
      flex-direction: column !important;
      gap: 1.28cqw !important;
      margin-bottom: 5.13cqw !important;
    }
    .pdp .pdp__info-headline-sub {
      font-size: 3.72cqw !important;
      font-weight: 400 !important;
      line-height: 1.3 !important;
      letter-spacing: -0.5px !important;
    }
    .pdp .pdp__info-headline-main {
      font-size: 6.67cqw !important;
      font-weight: 700 !important;
      line-height: 1.4 !important;
      letter-spacing: -0.5px !important;
      white-space: nowrap !important;
    }
    .pdp .pdp__info-row {
      padding-bottom: 3.08cqw !important;
      border-bottom: 1px solid #000 !important;
    }
    .pdp .pdp__info-row:last-child {
      padding-bottom: 0 !important;
      border-bottom: none !important;
      padding-top: 3.08cqw !important;
    }
    .pdp .pdp__info-row-header {
      display: flex !important;
      align-items: center !important;
      gap: 1.54cqw !important;
      margin-bottom: 0.51cqw !important;
    }
    .pdp .pdp__info-row-num {
      flex-shrink: 0 !important;
      width: 4.87cqw !important;
      height: 4.87cqw !important;
      background: #0e0e0e !important;
      border-radius: 50% !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      color: #fff !important;
      font-size: 2.82cqw !important;
      font-weight: 500 !important;
      letter-spacing: -0.5px !important;
      line-height: 1 !important;
    }
    .pdp .pdp__info-row-title {
      font-size: 4.10cqw !important;
      font-weight: 600 !important;
      line-height: 1.5 !important;
      letter-spacing: -0.5px !important;
    }
    .pdp .pdp__info-row-desc {
      font-size: 3.72cqw !important;
      font-weight: 400 !important;
      line-height: 1.5 !important;
      letter-spacing: -0.5px !important;
    }
  </style>
</head>
<body>
  <div class="pdp">
    <div class="pdp__kv" style="--pdp-kv-bg: #000;" >
      <div class="pdp__kv-header">
        <img class="pdp__kv-title" src="images/pdp_kv_title01.svg" alt="에센셜 웨딩 패키지">
        <p class="pdp__kv-subtitle">부담은 비우고 실속은 채운 <b>신혼 필수 큐레이션</b></p>
      </div>
      <div class="pdp__kv-image">
        <img src="images/pdp_kv_02_crop.jpg" alt="에센셜 웨딩 패키지">
      </div>
    </div>

    <div class="pdp__info" style="--pdp-info-bg: #daebcc;">
      <div class="pdp__info-headline">
        <p class="pdp__info-headline-sub">꼭 필요한 가전과 가구만 모아,</p>
        <p class="pdp__info-headline-main">합리적으로 시작하는 첫 우리 집</p>
      </div>
      <div class="pdp__info-row">
        <div class="pdp__info-row-header">
          <span class="pdp__info-row-num">1</span>
          <p class="pdp__info-row-title">이런 분께 추천해요</p>
        </div>
        <p class="pdp__info-row-desc">첫 혼수나 이사를 준비하며 필수 가전과 가구를 갖추고 싶은 분</p>
      </div>
      <div class="pdp__info-row">
        <div class="pdp__info-row-header">
          <span class="pdp__info-row-num">2</span>
          <p class="pdp__info-row-title">홈스타일 추천 코멘트</p>
        </div>
        <p class="pdp__info-row-desc">꼭 필요한 제품만 구성해 새 출발의 부담을 줄인 실속형 패키지</p>
      </div>
    </div>
  </div>
</body>
</html>
