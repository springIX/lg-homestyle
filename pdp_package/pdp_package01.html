<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestyle PDP Package</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/pdp_package.css">
</head>
<body>
  <div class="pdp">
    <div class="pdp__kv" style="--pdp-kv-bg: #daebcc;">
      <h2 class="pdp__kv-title">에센셜<br>웨딩 패키지</h2>
      <p class="pdp__kv-subtitle">부담은 비우고 실속은 채운<br>신혼 필수 큐레이션</p>
      <div class="pdp__kv-badge">
        <img src="images/ellipse.svg" alt="">
        <span>No.01</span>
      </div>
      <div class="pdp__kv-image">
        <img src="images/pdp_kv_01.jpg" alt="에센셜 웨딩 패키지">
      </div>
    </div>

    <div class="pdp__info">
      <h3 class="pdp__info-headline">꼭 필요한 가전과 가구만 모아,<br>합리적으로 시작하는 첫 우리 집</h3>
      <div class="pdp__info-card">
        <p class="pdp__info-card-title">이런 분께 추천해요</p>
        <p class="pdp__info-card-desc">첫 혼수나 이사를 준비하며 꼭 필요한 가전과<br>가구부터 마련하고 싶은 분</p>
      </div>
      <div class="pdp__info-card">
        <p class="pdp__info-card-title">홈스타일 추천 코멘트</p>
        <p class="pdp__info-card-desc">꼭 필요한 핵심 가전과 가구를 중심으로 구성해<br>새로운 일상을 부담 없이 준비할 수 있는 실속형<br>패키지입니다.</p>
      </div>
    </div>
  </div>
</body>
</html>
