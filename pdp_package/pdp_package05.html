<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestyle PDP Package</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/pdp_package.css">
</head>
<body>
  <div class="pdp">
    <div class="pdp__kv" style="--pdp-kv-bg: #000; --pdp-kv-title-width: 578px;">
      <div class="pdp__kv-header">
        <img class="pdp__kv-title" src="images/pdp_kv_title10.svg" alt="공간 리프레시 패키지">
        <p class="pdp__kv-subtitle">새 집 인테리어 고민을 덜어줄 <b>완벽한 가이드</b></p>
      </div>
      <div class="pdp__kv-image">
        <img src="images/pdp_kv_05_crop.jpg" alt="공간 리프레시 패키지">
      </div>
    </div>

    <div class="pdp__info" style="--pdp-info-bg: #eedfbf;">
      <div class="pdp__info-headline">
        <p class="pdp__info-headline-sub">가전과 가구가 하나처럼 어우러지는,</p>
        <p class="pdp__info-headline-main">새 집 맞춤 공간 큐레이션</p>
      </div>
      <div class="pdp__info-row">
        <div class="pdp__info-row-header">
          <span class="pdp__info-row-num">1</span>
          <p class="pdp__info-row-title">이런 분께 추천해요</p>
        </div>
        <p class="pdp__info-row-desc">이사나 집 분위기 전환에 필요한 제품을 한 번에 갖추고 싶은 분</p>
      </div>
      <div class="pdp__info-row">
        <div class="pdp__info-row-header">
          <span class="pdp__info-row-num">2</span>
          <p class="pdp__info-row-title">홈스타일 추천 코멘트</p>
        </div>
        <p class="pdp__info-row-desc">인기 가전과 가구를 모아 주요 공간을 한 번에 완성하는 패키지</p>
      </div>
    </div>
  </div>
</body>
</html>
