<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestyle Banner</title>

  <!--
    UA 감지 → <html>에 is-desktop / is-mobile 클래스 부여
    - Desktop : min-width 1380px 고정, 이하 가로 스크롤
    - Mobile  : 별도 세로형 레이아웃 적용
  -->
  <script>
    (function () {
      var isMobile  = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      document.documentElement.classList.add(isMobile ? 'is-mobile' : 'is-desktop');

      if (!isMobile) {
        var style = document.createElement('style');
        style.textContent = 'html, body { min-width: 1380px; }';
        document.head.appendChild(style);
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/banner.css">
</head>
<body>
  <div class="banner" style="--banner-overlay-color: #A16B31; --banner-overlay-stop: 100%;">
    <!-- ===== 공통: PC 배경 이미지 (모바일에서는 SCSS로 숨김) ===== -->
    <div class="banner__bg" style="background-image: url('https://www.lge.co.kr/home_style_pages/community/images/no55/banner-pc.jpg');"></div>

    <!-- ===== Desktop 전용 ===== -->
    <div class="banner__overlay"></div>

    <div class="banner__content">
      <div class="banner__brand">
        <span class="banner__brand-name">HOMESTYLE</span>
        <img src="https://www.lge.co.kr/home_style_pages/community/images/Homestyle_Logo.svg" alt="홈스타일" class="banner__brand-tag">
      </div>
      <h2 class="banner__title">SCENE NO.55</h2>
      <div class="banner__quote">
        <span class="banner__quote-mark"><img src="https://www.lge.co.kr/home_style_pages/community/images/double_quotation.svg" alt=""></span>
        <p class="banner__desc">
          고요한 분위기 속에 부드러운 형태를<br>
          더해 머무는 순간마다 편안한 공간을<br>
          만들고 싶어요
        </p>
      </div>
      <a class="banner__btn" href="https://homestyle.lge.co.kr/interior/community/detail/vJQ9OEi4xj">Scene No.55 상세보기</a>
    </div>

    <div class="banner__before-wrap">
      <span class="banner__label">Before</span>
      <div class="banner__before-wrap-img" style="background-image: url('https://www.lge.co.kr/home_style_pages/community/images/no55/before-pc.jpg');"></div>
    </div>

    <div class="banner__after">After</div>

    <!-- ===== Mobile 전용 ===== -->

    <!-- 상단: 텍스트 영역 -->
    <div class="banner__top">
      <div class="banner__top-bg" style="background-image: url('https://www.lge.co.kr/home_style_pages/community/images/no55/before-mo.jpg');"></div>
      <span class="banner__mo-before">Before</span>
      <div class="banner__top-content">
        <div class="banner__brand">
          <span class="banner__brand-name">HOMESTYLE</span>
          <img src="https://www.lge.co.kr/home_style_pages/community/images/Homestyle_Logo.svg" alt="홈스타일" class="banner__brand-tag">
        </div>
        <div class="banner__quote">
          <p class="banner__desc">
            밋밋한 거실 공간에 포인트가 될 수 있는<br>
            인테리어를 하고 싶어요
          </p>
        </div>
        <a class="banner__btn" href="https://homestyle.lge.co.kr/interior/community/detail/37Nalw3euh">Scene No.55 상세보기</a>
      </div>
    </div>

    <!-- 하단: After 이미지 -->
    <div class="banner__bottom">
      <div class="banner__bottom-bg" style="background-image: url('https://www.lge.co.kr/home_style_pages/community/images/no55/banner-mo.jpg');"></div>
      <span class="banner__bottom-label">After</span>
    </div>

  </div>
</body>
</html>
